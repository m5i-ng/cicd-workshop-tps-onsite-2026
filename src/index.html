<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TPS Onsite 2026</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #1e3a5f 0, transparent 45%),
          radial-gradient(circle at 80% 60%, #3d2c5c 0, transparent 40%),
          #0f1419;
        color: #e8eef5;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 36rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        line-height: 1.4;
      }
      p {
        margin-top: 1rem;
        opacity: 0.85;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TPS Onsite 2026にようこそ！</h1>
      <p>GitHub Actions × GitHub Pages ワークショップ用の静的ページです。</p>
    </main>
  </body>
</html>
