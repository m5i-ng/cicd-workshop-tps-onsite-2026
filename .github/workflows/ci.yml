name: CI

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ==========================================================================
      # Build profile (workshop): enable only ONE of the SLOW / FAST blocks below.
      # - Initial state (for main): SLOW enabled — inspect pipeline duration in Datadog
      # - Exercise: comment out SLOW, enable FAST, push to dev — compare duration
      # ==========================================================================

      # ----- SLOW BUILD (default) -----
      - name: Set up Node.js (no npm cache — slower install)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Artificial delay (workshop — remove this entire step in the FAST profile)
        run: |
          echo "Simulating a slow CI step for Datadog comparison..."
          sleep 45

      - name: Install dependencies
        run: npm ci

      # ----- FAST BUILD (comment out the SLOW block above, then enable below) -----
      # - name: Set up Node.js (with npm cache)
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version-file: ".nvmrc"
      #     cache: "npm"
      #
      # - name: Install dependencies
      #   run: npm ci

      - name: Test
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

